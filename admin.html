<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Nexus - Leo Club CMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #0a0a0f);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ffd70033;
        }
        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }
        .tab-btn.active {
            background: linear-gradient(90deg, #ffd700, #00f3ff);
            color: #0a0a0f;
        }
        .tab-pane { display: none; }
        .tab-pane.active-pane { display: block; }
        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #ffd70033;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #0a0a0f;
            border: 1px solid #ffd70033;
            border-radius: 8px;
            color: white;
        }
        button {
            background: linear-gradient(90deg, #ffd700, #00f3ff);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .item-card {
            background: #0a0a0f;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #ffd70033;
        }
        .item-card img { width: 100%; height: 180px; object-fit: cover; }
        .item-card .info { padding: 15px; }
        .delete-btn {
            background: #ff3366;
            padding: 6px 12px;
            margin-top: 10px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #00f3ff;
            color: #0a0a0f;
            padding: 12px 24px;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-crown"></i> Admin Nexus</h1>
        <p>Manage your Leo Club website content</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="projects">Projects</button>
        <button class="tab-btn" data-tab="gallery">Gallery</button>
        <button class="tab-btn" data-tab="team">Team</button>
        <button class="tab-btn" data-tab="about">About</button>
    </div>

    <!-- Projects Tab -->
    <div id="projects" class="tab-pane active-pane">
        <div class="card">
            <h3>Add New Project</h3>
            <input type="text" id="projTitle" placeholder="Project Title">
            <textarea id="projDesc" placeholder="Project Description"></textarea>
            <input type="text" id="projImage" placeholder="Image URL (GitHub raw link)">
            <button onclick="addProject()">Add Project</button>
        </div>
        <div class="card">
            <h3>Current Projects</h3>
            <div id="projectsList" class="items-grid"></div>
        </div>
    </div>

    <!-- Gallery Tab -->
    <div id="gallery" class="tab-pane">
        <div class="card">
            <h3>Add Gallery Image</h3>
            <input type="text" id="galleryUrl" placeholder="Image URL (GitHub raw link)">
            <button onclick="addGalleryImage()">Add Image</button>
        </div>
        <div class="card">
            <h3>Gallery</h3>
            <div id="galleryList" class="items-grid"></div>
        </div>
    </div>

    <!-- Team Tab -->
    <div id="team" class="tab-pane">
        <div class="card">
            <h3>Add Team Member</h3>
            <input type="text" id="teamName" placeholder="Name">
            <input type="text" id="teamRole" placeholder="Role">
            <textarea id="teamDesc" placeholder="Description"></textarea>
            <input type="text" id="teamImg" placeholder="Image URL">
            <button onclick="addTeamMember()">Add Member</button>
        </div>
        <div class="card">
            <h3>Team Members</h3>
            <div id="teamList" class="items-grid"></div>
        </div>
    </div>

    <!-- About Tab -->
    <div id="about" class="tab-pane">
        <div class="card">
            <h3>Edit About Section</h3>
            <textarea id="aboutContent" rows="10" placeholder="About content (HTML allowed)"></textarea>
            <button onclick="updateAbout()">Update About</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const REPO = "itzlewmitha/sjcleos";
    const TOKEN = "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";
    
    let projects = [];
    let gallery = [];
    let team = [];
    let about = "";
    let dataSha = null;

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    async function loadData() {
        const url = `https://api.github.com/repos/${REPO}/contents/data.json`;
        try {
            const response = await fetch(url, {
                headers: { 'Authorization': `token ${TOKEN}` }
            });
            if(response.ok) {
                const data = await response.json();
                dataSha = data.sha;
                const content = JSON.parse(atob(data.content));
                projects = content.projects || [];
                gallery = content.gallery || [];
                team = content.team || [];
                about = content.about || "";
                renderAll();
                showToast("Data loaded from GitHub!");
            } else {
                showToast("No existing data, starting fresh");
                renderAll();
            }
        } catch(e) {
            showToast("Error loading: " + e.message);
            renderAll();
        }
    }

    async function saveToGitHub() {
        const data = { projects, gallery, team, about, lastUpdated: new Date().toISOString() };
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
        
        const url = `https://api.github.com/repos/${REPO}/contents/data.json`;
        const body = {
            message: "Update website data",
            content: content,
            branch: "main"
        };
        if(dataSha) body.sha = dataSha;
        
        try {
            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });
            if(response.ok) {
                const result = await response.json();
                dataSha = result.content.sha;
                showToast("✅ Saved to GitHub! Site updated.");
                return true;
            } else {
                showToast("Error saving to GitHub");
                return false;
            }
        } catch(e) {
            showToast("Error: " + e.message);
            return false;
        }
    }

    function renderAll() {
        renderProjects();
        renderGallery();
        renderTeam();
        document.getElementById('aboutContent').value = about;
    }

    function renderProjects() {
        const container = document.getElementById('projectsList');
        container.innerHTML = projects.map((p, i) => `
            <div class="item-card">
                <img src="${p.image}" onerror="this.src='https://placehold.co/400x200'">
                <div class="info">
                    <h4>${p.title}</h4>
                    <p>${p.desc}</p>
                    <button class="delete-btn" onclick="deleteProject(${i})">Delete</button>
                </div>
            </div>
        `).join('');
    }

    function renderGallery() {
        const container = document.getElementById('galleryList');
        container.innerHTML = gallery.map((img, i) => `
            <div class="item-card">
                <img src="${img}" onerror="this.src='https://placehold.co/400x400'">
                <div class="info">
                    <button class="delete-btn" onclick="deleteGallery(${i})">Delete</button>
                </div>
            </div>
        `).join('');
    }

    function renderTeam() {
        const container = document.getElementById('teamList');
        container.innerHTML = team.map((m, i) => `
            <div class="item-card">
                <img src="${m.img}" onerror="this.src='https://placehold.co/400x400'">
                <div class="info">
                    <h4>${m.name}</h4>
                    <p><strong>${m.role}</strong></p>
                    <p>${m.desc}</p>
                    <button class="delete-btn" onclick="deleteTeam(${i})">Delete</button>
                </div>
            </div>
        `).join('');
    }

    async function addProject() {
        const title = document.getElementById('projTitle').value;
        const desc = document.getElementById('projDesc').value;
        const image = document.getElementById('projImage').value;
        if(title && desc && image) {
            projects.push({ title, desc, image });
            if(await saveToGitHub()) {
                renderProjects();
                document.getElementById('projTitle').value = '';
                document.getElementById('projDesc').value = '';
                document.getElementById('projImage').value = '';
            }
        } else showToast("Fill all fields");
    }

    async function addGalleryImage() {
        const url = document.getElementById('galleryUrl').value;
        if(url) {
            gallery.push(url);
            if(await saveToGitHub()) {
                renderGallery();
                document.getElementById('galleryUrl').value = '';
            }
        }
    }

    async function addTeamMember() {
        const name = document.getElementById('teamName').value;
        const role = document.getElementById('teamRole').value;
        const desc = document.getElementById('teamDesc').value;
        const img = document.getElementById('teamImg').value;
        if(name && role && img) {
            team.push({ name, role, desc, img });
            if(await saveToGitHub()) {
                renderTeam();
                document.getElementById('teamName').value = '';
                document.getElementById('teamRole').value = '';
                document.getElementById('teamDesc').value = '';
                document.getElementById('teamImg').value = '';
            }
        }
    }

    async function updateAbout() {
        about = document.getElementById('aboutContent').value;
        await saveToGitHub();
    }

    async function deleteProject(i) { projects.splice(i,1); await saveToGitHub(); renderProjects(); }
    async function deleteGallery(i) { gallery.splice(i,1); await saveToGitHub(); renderGallery(); }
    async function deleteTeam(i) { team.splice(i,1); await saveToGitHub(); renderTeam(); }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active-pane'));
            document.getElementById(btn.dataset.tab).classList.add('active-pane');
        });
    });

    loadData();
</script>
</body>
</html>
